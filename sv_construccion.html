<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SV Tennis · Próximamente</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Bebas+Neue&family=Space+Mono&display=swap');

  :root {
    --black: #000;
    --white: #fff;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --green: #2e7d32;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: var(--white);
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
  }

  /* ── Court lines background ── */
  .court {
    position: fixed; inset: 0; z-index: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .court svg {
    width: 100vw; height: 100vh;
    opacity: 0.06;
  }

  /* ── Radial glow ── */
  .glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(46,125,50,0.18) 0%, transparent 70%);
  }

  /* ── Top/bottom gold rules ── */
  .rule-top, .rule-bottom {
    position: fixed; left: 0; right: 0; z-index: 3;
    height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .rule-top { top: 40px; animation: fadeIn 2s ease 0.5s both; }
  .rule-bottom { bottom: 40px; animation: fadeIn 2s ease 0.5s both; }

  /* ── Main container ── */
  .stage {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    padding: 60px 20px;
  }

  /* ── Logo GIF ── */
  .logo-wrap {
    width: 220px;
    animation: fadeIn 1.2s ease 0.3s both;
  }
  .logo-wrap img {
    width: 100%; display: block;
    /* fondo negro del gif se mezcla natural */
  }

  /* ── Coming soon label ── */
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 4px;
    animation: fadeIn 1.2s ease 0.8s both;
  }

  /* ── Divider ── */
  .divider {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 28px 0;
    animation: fadeIn 1.2s ease 1s both;
  }

  /* ── Headline ── */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 88px);
    letter-spacing: 8px;
    line-height: 1;
    text-align: center;
    animation: slideUp 1s ease 1.1s both;
  }
  .headline span {
    display: block;
    color: var(--gold);
    font-size: clamp(14px, 3vw, 20px);
    letter-spacing: 12px;
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  /* ── Tagline ── */
  .tagline {
    font-size: clamp(14px, 2.5vw, 18px);
    font-weight: 300;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.55);
    margin-top: 20px;
    text-align: center;
    animation: fadeIn 1.2s ease 1.5s both;
    font-style: italic;
  }

  /* ── WhatsApp CTA ── */
  .cta {
    margin-top: 40px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeIn 1.2s ease 1.8s both;
  }
  .cta a {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid var(--gold);
    color: var(--gold);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 14px 28px;
    text-transform: uppercase;
    transition: background 0.3s, color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .cta a::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }
  .cta a:hover { color: var(--black); }
  .cta a:hover::before { transform: scaleX(1); }

  /* ── Corner decorations ── */
  .corner {
    position: fixed; z-index: 3;
    width: 40px; height: 40px;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner--tl { top: 28px; left: 28px; }
  .corner--tr { top: 28px; right: 28px; transform: scaleX(-1); }
  .corner--bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
  .corner--br { bottom: 28px; right: 28px; transform: scale(-1); }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .logo-wrap { width: 160px; }
    .rule-top, .rule-bottom { display: none; }
    .corner { display: none; }
  }
</style>
</head>
